# =============================================================
# Preis-Update alle 30 Minuten via Tankerkönig API
# 48 Standorte × 25km = ganz Deutschland flächendeckend
# Alle Standorte werden in jedem Lauf komplett abgefragt
# Committed die neuen Daten → triggert automatisch deploy.yml
# =============================================================

name: Update Fuel Prices

on:
  schedule:
    # Alle 30 Minuten: Minute 7 und 37 (vermeidet :00/:30 Rush)
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: price-update
  cancel-in-progress: true

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Tankstellenpreise abrufen (ganz Deutschland)
        run: node scripts/fetch-prices.mjs
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.VITE_TANKERKOENIG_API_KEY }}

      - name: Preis-Daten committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stations.json
          # Nur committen wenn sich Daten geändert haben
          if git diff --cached --quiet; then
            echo "Keine Änderungen, überspringe Commit"
          else
            git commit -m "chore: Preise aktualisiert — $(date -u +'%H:%M UTC') [$(date -u +'%Y-%m-%d')]"
            git push
          fi
